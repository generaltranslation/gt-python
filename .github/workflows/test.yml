name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CI: true

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run tests
        run: uv run pytest
