[project]
name = "gt-i18n"
version = "0.0.3"
description = "Python i18n library for General Translation"
readme = "README.md"
authors = [
    { name = "Ernest McCarter", email = "ernest@generaltranslation.com" }
]
requires-python = ">=3.10"
license = "FSL-1.1-ALv2"
license-files = ["LICENSE.md"]
dependencies = [
    "generaltranslation",
    "generaltranslation-supported-locales",
    "httpx>=0.25.0",
]

[tool.uv.sources]
generaltranslation = { workspace = true }
generaltranslation-supported-locales = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.8,<0.11.0"]
build-backend = "uv_build"
