[project]
name = "generaltranslation"
version = "0.1.0"
description = "Core Python language toolkit for General Translation"
readme = "README.md"
authors = [
    { name = "Ernest McCarter", email = "ernest@generaltranslation.com" }
]
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "httpx>=0.27.0",
    "langcodes>=3.4.0",
]

[build-system]
requires = ["uv_build>=0.10.8,<0.11.0"]
build-backend = "uv_build"
