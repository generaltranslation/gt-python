[project]
name = "generaltranslation"
version = "0.0.3"
description = "Core Python language toolkit for General Translation"
readme = "README.md"
authors = [
    { name = "Ernest McCarter", email = "ernest@generaltranslation.com" }
]
requires-python = ">=3.10"
license = "FSL-1.1-ALv2"
license-files = ["LICENSE.md"]
dependencies = [
    "babel>=2.18.0",
    "generaltranslation-icu-messageformat-parser",
    "generaltranslation-intl-messageformat",
    "httpx>=0.27.0",
]

[build-system]
requires = ["uv_build>=0.10.8,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
generaltranslation-intl-messageformat = { workspace = true }
generaltranslation-icu-messageformat-parser = { workspace = true }
